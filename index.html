<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Travel Lanka - Tour Packages</title>

    <!-- Bootstrap 5 (design + responsive layout) -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <!-- Our own extra styles -->
    <link href="css/style.css" rel="stylesheet">
</head>
<body>

<!-- Navbar is injected by layout.js -->
<div id="site-navbar"></div>

<main class="py-4">

    <!-- ==================== HERO BANNER ==================== -->
    <section class="hero text-center mb-5">
        <div class="container">
            <h1 class="display-4 fw-bold">Come to Sri Lanka - Discover Your Next Adventure</h1>
            <p class="lead">Handpicked tour packages across beautiful Ceylon</p>
        </div>
    </section>

    <div class="container">
        <h3 class="mb-4" id="packages">Our Tour Packages</h3>
        <div class="row g-4" id="package-grid">
            <!-- Cards are inserted here by home.js -->
        </div>
    </div>

</main>

<!-- Footer is injected by layout.js -->
<div id="site-footer"></div>

<!-- Bootstrap JavaScript (mobile menu, etc.) -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<!-- Our data + scripts -->
<script src="js/data.js"></script>
<script src="js/layout.js"></script>
<script src="js/home.js"></script>
</body>
</html>
