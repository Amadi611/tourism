<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact - Travel Lanka</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link href="css/style.css" rel="stylesheet">
</head>
<body>

<div id="site-navbar"></div>

<main class="py-4">
    <div class="container">
        <h3 class="mb-4">Contact Us</h3>
        <div class="row g-4">

            <!-- LEFT: details -->
            <div class="col-lg-5">
                <div class="p-4 bg-white rounded shadow-sm h-100">
                    <p class="mb-3"><i class="bi bi-geo-alt-fill text-danger"></i>
                        123 Galle Road, Colombo 03, Sri Lanka</p>
                    <p class="mb-3"><i class="bi bi-telephone-fill text-primary"></i>
                        +94 11 234 5678</p>
                    <p class="mb-3"><i class="bi bi-envelope-fill text-primary"></i>
                        info@travellanka.example</p>
                    <p class="mb-0"><i class="bi bi-clock-fill text-primary"></i>
                        Mon–Sat, 9:00 AM – 6:00 PM</p>
                    <hr>
                    <a class="btn btn-outline-primary btn-sm me-2" href="#"><i class="bi bi-facebook"></i></a>
                    <a class="btn btn-outline-primary btn-sm me-2" href="#"><i class="bi bi-instagram"></i></a>
                    <a class="btn btn-outline-primary btn-sm" href="#"><i class="bi bi-whatsapp"></i></a>
                </div>
            </div>

            <!-- RIGHT: message form -->
            <div class="col-lg-7">
                <div class="p-4 bg-white rounded shadow-sm">
                    <form id="contact-form">
                        <div class="mb-3">
                            <label class="form-label">Your Name</label>
                            <input type="text" name="name" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Email</label>
                            <input type="email" name="email" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Message</label>
                            <textarea name="message" class="form-control" rows="5" required></textarea>
                        </div>
                        <button type="submit" class="btn btn-primary">
                            <i class="bi bi-send"></i> Send Message
                        </button>
                    </form>
                    <div id="contact-result" class="mt-3"></div>
                </div>
            </div>

        </div>
    </div>
</main>

<div id="site-footer"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/layout.js"></script>
<script src="js/contact.js"></script>
</body>
</html>
